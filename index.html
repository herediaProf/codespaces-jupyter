<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Meu Currículo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <img src="./img/templo.jpg" alt="Minha foto de perfil" class="foto-perfil">

        <h1>Olá, eu sou <span id="nome-digitado"></span></h1>
        
        <p>Estudante de tecnologia e futuro desenvolvedor.</p>
    </div>

    <script>
        const texto = "Prof. : Wanderson Tadeu G. Heredia "; // Alunos: Coloquem o nome de vocês aqui!
        let i = 0;
        
        function digitar() {
            if (i < texto.length) {
                document.getElementById("nome-digitado").innerHTML += texto.charAt(i);
                i++;
                setTimeout(digitar, 100); // 100 é a velocidade da digitação
            }
        }
        digitar(); // Inicia a função
    </script>
</body>
</html>
